{% extends "core_APP/base.html" %}
{% block title %}Sign Up · MC-Manager{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Create Account</h1>

        {% if messages %}
        <ul class="messages">
            {% for msg in messages %}
            <li class="{{ msg.tags }}">{{ msg }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required>

            <label for="confirm">Confirm Password</label>
            <input type="password" id="confirm" name="confirm" autocomplete="new-password" required>

            <label for="secretPin">Secret Pin</label>
            <input type="password" id="secretPin" name="secretPin" required>

            <button type="submit">Sign Up</button>
        </form>

        <span class="alt-link">Already have an account? <a href="{% url 'login' %}">Log in</a></span>
    </div>
</div>
{% endblock %}
